{% extends "layout.html" %}

{% block title %}{{ title }} | DocSprint{% endblock %}

{% block content %}
  <section class="empty-state card error-card">
    <span class="eyebrow">Something went wrong</span>
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>
    <a href="{{ url_for('dashboard') if current_user else url_for('login') }}" class="primary-button inline-button">
      {{ "Return to dashboard" if current_user else "Choose a demo user" }}
    </a>
  </section>
{% endblock %}
